name: PR Test Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  quick-test:
    name: Quick Test Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Compile Tests
        run: ./gradlew compileTestJava --no-daemon

      - name: Run Unit Tests
        run: ./gradlew test --no-daemon -x apiComprehensiveTest
        continue-on-error: true

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quick-test-results
          path: build/test-results/test/
          retention-days: 7

      - name: Test Summary
        if: always()
        run: |
          echo "## 📊 Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Compilation successful" >> $GITHUB_STEP_SUMMARY
          echo "- 🧪 Unit tests executed" >> $GITHUB_STEP_SUMMARY
          echo "- 📦 Artifacts uploaded" >> $GITHUB_STEP_SUMMARY
