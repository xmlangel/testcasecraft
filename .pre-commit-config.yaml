exclude: ^docs/|^d_mcpsvr_jira/|^\.agent/
repos:
  # Python
  - repo: https://github.com/psf/black
    rev: 26.3.1
    hooks:
      - id: black

  - repo: https://github.com/pycqa/flake8
    rev: 7.3.0
    hooks:
      - id: flake8

  # JS / Vite
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.56.0
    hooks:
      - id: eslint
        files: \.(js|ts|jsx|tsx)$
        args: ["--config", ".eslintrc.json"]

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier

  # Java (local 실행)
  - repo: local
    hooks:
      - id: google-java-format
        name: google-java-format
        entry: bash -c 'find . -name "*.java" | xargs java -jar google-java-format.jar --replace'
        language: system
        types: [java]

      - id: java-lint
        name: Java Compilation & Linting
        entry: ./gradlew compileJava
        language: system
        files: \.java$
        pass_filenames: false

      - id: java-test
        name: Java Tests
        entry: ./gradlew test
        language: system
        pass_filenames: false
        stages: [push]

      # - id: ollama-code-review
      #   name: Ollama Code Review
      #   entry: python scripts/ollama_review.py
      #   language: system
      #   pass_filenames: false
