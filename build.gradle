plugins {
	id 'org.springframework.boot' version '3.2.4'
	id 'io.spring.dependency-management' version '1.1.4'
	id 'java'
	id 'io.qameta.allure' version '2.11.2'
	id 'com.github.node-gradle.node' version '7.0.2'
}

def frontendDir = "$projectDir/src/main/frontend"

node {
	version = '20.13.1'
	npmVersion = '10.5.0'
	download = true
	workDir = file("${project.buildDir}/nodejs")
	npmWorkDir = file("${project.buildDir}/npm")
}

task appNpmInstall(type: NpmTask) {
	workingDir = file(frontendDir)
	args = ['install']
	inputs.file "$frontendDir/package.json"
	outputs.dir "$frontendDir/node_modules"
}

task appNpmBuild(type: NpmTask) {
	dependsOn appNpmInstall
	workingDir = file(frontendDir)
	args = ['run', 'build']
	inputs.dir "$frontendDir"
	outputs.dir "$frontendDir/build"

	// 환경변수 맵으로 설정
	def apiBaseUrl = project.hasProperty('REACT_APP_API_BASE_URL')
			? project.property('REACT_APP_API_BASE_URL')
			: 'https://qaspecialist.shop'
	environment = [
			'REACT_APP_API_BASE_URL': apiBaseUrl
	]
}

task copyFrontend(type: Copy) {
	dependsOn appNpmBuild
	from "$frontendDir/build"
	into "$buildDir/resources/main/static"
}

// processResources에 프론트엔드 빌드 의존성 추가
processResources {
	dependsOn copyFrontend
}

group = 'com.testcase'
version = '0.0.1-SNAPSHOT'
sourceCompatibility = '21'

repositories {
	mavenCentral()
}

dependencies {
	implementation 'org.springframework.boot:spring-boot-starter-aop'
	implementation 'org.springframework.boot:spring-boot-starter-web'
	implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
	implementation 'org.springframework.boot:spring-boot-starter-validation'
	implementation 'org.postgresql:postgresql:42.7.3'
	implementation 'org.bgee.log4jdbc-log4j2:log4jdbc-log4j2-jdbc4.1:1.16'
	implementation 'org.apache.commons:commons-csv:1.14.0'
	implementation 'com.fasterxml.jackson.core:jackson-databind:2.17.0'
	implementation 'com.fasterxml.jackson.core:jackson-core:2.17.0'
	implementation 'com.fasterxml.jackson.core:jackson-annotations:2.17.0'

	// excel
	implementation 'org.apache.poi:poi:5.2.5'
	implementation 'org.apache.poi:poi-ooxml:5.2.5'

	// csv
	implementation 'com.opencsv:opencsv:5.8'

	//smtp
	implementation 'org.springframework.boot:spring-boot-starter-mail'


	// jwt
	implementation 'org.springframework.boot:spring-boot-starter-security'
	implementation 'org.springframework.security:spring-security-oauth2-client'
	implementation 'org.springframework.security:spring-security-oauth2-jose'
	implementation 'io.jsonwebtoken:jjwt-api:0.11.5'
	runtimeOnly 'io.jsonwebtoken:jjwt-impl:0.11.5'
	runtimeOnly 'io.jsonwebtoken:jjwt-jackson:0.11.5'
	//
	compileOnly 'org.projectlombok:lombok:1.18.34'
	annotationProcessor 'org.projectlombok:lombok:1.18.34'
	testCompileOnly 'org.projectlombok:lombok:1.18.34'
	testAnnotationProcessor 'org.projectlombok:lombok:1.18.34'
	testImplementation 'org.springframework.boot:spring-boot-starter-test'

	// 테스트 프레임워크
	testImplementation 'io.rest-assured:rest-assured:5.3.2'
	testImplementation 'io.rest-assured:json-schema-validator:5.3.2'
	testImplementation 'org.hamcrest:hamcrest:2.2'
	testImplementation 'org.springframework:spring-test:6.1.5'
	testImplementation 'org.springframework.boot:spring-boot-starter-test:3.2.0'
	testImplementation 'org.testng:testng:7.10.2'
	testImplementation 'com.h2database:h2:2.2.224'
	runtimeOnly 'com.h2database:h2:2.2.224'  // 런타임에도 H2 사용 가능하도록 추가
	testImplementation 'io.qameta.allure:allure-testng:2.19.0'
	testImplementation 'io.qameta.allure:allure-rest-assured:2.19.0'
	testRuntimeOnly 'org.aspectj:aspectjweaver:1.9.22'

	//google
	implementation 'com.google.apis:google-api-services-sheets:v4-rev516-1.23.0'
	implementation 'com.google.auth:google-auth-library-oauth2-http:0.20.0'
	implementation 'com.google.api-client:google-api-client:1.23.0'
	implementation 'com.google.oauth-client:google-oauth-client-jetty:1.23.0'

	// JSON Schema Validator (Networknt)
	implementation 'com.networknt:json-schema-validator:1.0.83'

	// Spring Security Test
	testImplementation 'org.springframework.security:spring-security-test'
}


allure {
	version = '2.19.0'
	adapter {
		frameworks {
			testng {
				adapterVersion = '2.19.0' // TestNG 어댑터 버전 명시
			}
		}
	}
}

test {
	useTestNG()
	systemProperties = [
			'allure.results.directory': 'build/allure-results' // 결과 디렉터리 명시
	]
	testLogging {
		events "PASSED", "FAILED", "SKIPPED"
		exceptionFormat = 'full'
	}
}
