services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: testcase-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-testcase_management}
      POSTGRES_USER: ${POSTGRES_USER:-testcase_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-testcase_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - testcase-network
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-testcase_user} -d ${POSTGRES_DB:-testcase_management}"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: testcase-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password} --appendonly yes
    volumes:
      - redis_data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf
    networks:
      - testcase-network
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Application
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        - JAR_FILE=build/libs/testcasemanagement-*.jar
    container_name: testcase-app
    restart: unless-stopped
    ports:
      - "8080:8080"  # 프론트엔드에서 직접 접근 가능하도록 포트 노출
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-testcase_management}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-testcase_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-testcase_password}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password}
      JWT_SECRET: ${JWT_SECRET}
      JIRA_ENCRYPTION_KEY: ${JIRA_ENCRYPTION_KEY}
      SERVER_PORT: 8080
      UPLOAD_PATH: ${UPLOAD_PATH:-/app/uploads}
      DOMAIN_NAME: ${DOMAIN_NAME:-localhost}
      ENABLE_HTTPS: ${ENABLE_HTTPS:-false}
    volumes:
      - uploads_data:${UPLOAD_PATH:-/app/uploads}
      - app_logs:/app/logs
    networks:
      - testcase-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: testcase-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
      # Let's Encrypt 인증서 (HTTPS 사용시)
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    networks:
      - testcase-network
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Certbot for Let's Encrypt (HTTPS 사용시에만)
  certbot:
    image: certbot/certbot
    container_name: testcase-certbot
    restart: "no"
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    profiles:
      - https  # HTTPS 프로파일에서만 실행
    command: >
      sh -c "
        echo 'Waiting for nginx to start...' &&
        sleep 30 &&
        certbot certonly --webroot --webroot-path=/var/www/certbot 
        --email ${CERTBOT_EMAIL} --agree-tos --no-eff-email 
        -d ${DOMAIN_NAME} ${CERTBOT_EXTRA_DOMAINS}
      "

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local
  app_logs:
    driver: local
  nginx_logs:
    driver: local
  certbot_www:
    driver: local
  certbot_conf:
    driver: local

networks:
  testcase-network:
    driver: bridge
