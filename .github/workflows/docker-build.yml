name: Docker Build, Release and Push

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      phase:
        description: 'Execution Phase'
        required: true
        default: 'build_release'
        type: choice
        options:
          - build_release
          - push_only
      target:
        description: 'Build Target'
        required: true
        default: 'app'
        type: choice
        options:
          - all
          - app
          - rag
      version:
        description: 'Version (e.g., 1.0.35)'
        required: true

permissions:
  contents: write

jobs:
  build-release-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse Build Context
        run: |
          VERSION_REGEX='[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?'

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "TARGET=${{ github.event.inputs.target }}" >> "$GITHUB_ENV"
            echo "VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_ENV"
            echo "PHASE=${{ github.event.inputs.phase }}" >> "$GITHUB_ENV"
          else
            TAG_NAME=${GITHUB_REF#refs/tags/}
            echo "Processing tag: $TAG_NAME"

            # v1.2.3-app -> VERSION=1.2.3, TARGET=app
            # v1.2.3-dev-app -> VERSION=1.2.3-dev, TARGET=app
            # v1.2.3 -> VERSION=1.2.3, TARGET=app (default for tag push)
            # v1.2.3-dev -> VERSION=1.2.3-dev, TARGET=app (default for tag push)
            if [[ "$TAG_NAME" =~ ^v(${VERSION_REGEX})-(app|rag)$ ]]; then
              echo "VERSION=${BASH_REMATCH[1]}" >> "$GITHUB_ENV"
              echo "TARGET=${BASH_REMATCH[2]}" >> "$GITHUB_ENV"
            elif [[ "$TAG_NAME" =~ ^v(${VERSION_REGEX})-all$ ]]; then
              echo "Error: '-all' tag push is disabled. Use workflow_dispatch with target=all."
              exit 1
            elif [[ "$TAG_NAME" =~ ^v(${VERSION_REGEX})$ ]]; then
              echo "VERSION=${BASH_REMATCH[1]}" >> "$GITHUB_ENV"
              echo "TARGET=app" >> "$GITHUB_ENV"
            else
              echo "Error: Tag format invalid. Use vX.Y.Z[-PRERELEASE] or vX.Y.Z[-PRERELEASE]-app|rag"
              exit 1
            fi

            # 태그 이벤트는 기본적으로 빌드 + 릴리즈 생성(푸시 없음)
            echo "PHASE=build_release" >> "$GITHUB_ENV"
            echo "RELEASE_TAG=$TAG_NAME" >> "$GITHUB_ENV"
          fi

      - name: Validate Inputs
        run: |
          if [[ ! "${{ env.VERSION }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Error: VERSION must be X.Y.Z or X.Y.Z-PRERELEASE format (e.g., 1.0.35, 1.0.42-dev)"
            exit 1
          fi

          if [[ ! "${{ env.PHASE }}" =~ ^(build_release|push_only)$ ]]; then
            echo "Error: PHASE must be build_release or push_only"
            exit 1
          fi

      - name: Resolve Release Tag (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          BASE_TAG="v${{ env.VERSION }}"
          TARGET_TAG="${BASE_TAG}-${{ env.TARGET }}"
          TAG_EXISTS=false

          if git tag -l | grep -q "^${BASE_TAG}$"; then
            TAG_EXISTS=true
          fi
          if git tag -l | grep -q "^${TARGET_TAG}$"; then
            TAG_EXISTS=true
          fi

          if [[ "${{ env.PHASE }}" == "push_only" && "$TAG_EXISTS" != "true" ]]; then
            echo "Error: No matching tag found for push_only. Expected ${TARGET_TAG} or ${BASE_TAG}"
            exit 1
          fi

          if [[ "${{ env.TARGET }}" == "all" ]]; then
            if git tag -l | grep -q "^${BASE_TAG}$"; then
              RELEASE_TAG="$BASE_TAG"
            elif git tag -l | grep -q "^${TARGET_TAG}$"; then
              RELEASE_TAG="$TARGET_TAG"
            else
              # build_release on workflow_dispatch: allow running without pre-created tag
              RELEASE_TAG="$BASE_TAG"
            fi
          else
            if git tag -l | grep -q "^${TARGET_TAG}$"; then
              RELEASE_TAG="$TARGET_TAG"
            elif git tag -l | grep -q "^${BASE_TAG}$"; then
              RELEASE_TAG="$BASE_TAG"
            else
              # build_release on workflow_dispatch: allow running without pre-created tag
              RELEASE_TAG="$TARGET_TAG"
            fi
          fi

          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"
          echo "Resolved release tag: $RELEASE_TAG"

          if git tag -l | grep -q "^${RELEASE_TAG}$"; then
            echo "RELEASE_TAG_EXISTS=true" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG_EXISTS=false" >> "$GITHUB_ENV"
            echo "No pre-existing tag found. Release tag ${RELEASE_TAG} will be created from current commit."
          fi

      - name: Checkout Resolved Tag (push_only)
        if: github.event_name == 'workflow_dispatch' && env.PHASE == 'push_only'
        run: |
          git checkout "${{ env.RELEASE_TAG }}"
          echo "Checked out tag: ${{ env.RELEASE_TAG }}"

      - name: Configure Phase Flags
        run: |
          if [[ "${{ env.PHASE }}" == "push_only" ]]; then
            echo "SHOULD_PUSH=true" >> "$GITHUB_ENV"
            echo "SHOULD_CREATE_RELEASE=false" >> "$GITHUB_ENV"
          else
            echo "SHOULD_PUSH=false" >> "$GITHUB_ENV"
            echo "SHOULD_CREATE_RELEASE=true" >> "$GITHUB_ENV"
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: env.SHOULD_PUSH == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build (and optionally Push) with Script
        run: |
          chmod +x docker-compose-build/build-and-push-multiplatform.sh

          CMD=("./docker-compose-build/build-and-push-multiplatform.sh" "--non-interactive" "${{ env.TARGET }}" "--version" "${{ env.VERSION }}")

          if [[ "${{ env.SHOULD_PUSH }}" == "true" ]]; then
            CMD+=("--push")
          else
            CMD+=("--build-only")
            CMD+=("--skip-tag-verify")
          fi

          echo "Running: ${CMD[*]}"
          "${CMD[@]}"

      - name: Generate Release Notes
        if: env.SHOULD_CREATE_RELEASE == 'true'
        run: |
          VERSION=${{ env.VERSION }}
          KN_FILE="docs/release_note/RELEASE_NOTE_${VERSION}_KO.md"
          EN_FILE="docs/release_note/RELEASE_NOTE_${VERSION}_EN.md"

          echo "Building release notes for version $VERSION"
          touch release_notes.md

          if [ -f "$KN_FILE" ]; then
            echo "## Changes (한국어)" >> release_notes.md
            cat "$KN_FILE" >> release_notes.md
            echo -e "\n" >> release_notes.md
          fi

          if [ -f "$EN_FILE" ]; then
            echo "## Changes (English)" >> release_notes.md
            cat "$EN_FILE" >> release_notes.md
            echo -e "\n" >> release_notes.md
          fi

          if [ ! -f "$KN_FILE" ] && [ ! -f "$EN_FILE" ]; then
            CURRENT_TAG=${{ env.RELEASE_TAG }}
            echo "## Changes" >> release_notes.md

            if git rev-parse -q --verify "refs/tags/${CURRENT_TAG}" >/dev/null; then
              PREV_TAG=$(git describe --tags --abbrev=0 ${CURRENT_TAG}^ 2>/dev/null || echo "")
              if [ -z "$PREV_TAG" ]; then
                git log ${CURRENT_TAG} --pretty=format:"- %s" >> release_notes.md
              else
                git log ${PREV_TAG}..${CURRENT_TAG} --pretty=format:"- %s" >> release_notes.md
              fi
            else
              echo "- No existing tag baseline found. Showing recent commits from current branch." >> release_notes.md
              git log -n 20 --pretty=format:"- %s" >> release_notes.md
            fi
          fi

      - name: Create GitHub Release
        if: env.SHOULD_CREATE_RELEASE == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          body_path: release_notes.md
          name: Release ${{ env.VERSION }} (${{ env.TARGET }})
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
