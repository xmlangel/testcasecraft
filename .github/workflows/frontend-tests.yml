name: Frontend Unit Tests

# 프런트엔드 vitest 단위 테스트를 PR·master push 시 자동 실행한다.
# (빌드/도커 워크플로우는 태그 push 전용이라 테스트가 돌지 않으므로 별도 게이트로 추가)
on:
  pull_request:
    paths:
      - "src/main/frontend/**"
      - ".github/workflows/frontend-tests.yml"
  push:
    branches: [master]
    paths:
      - "src/main/frontend/**"
      - ".github/workflows/frontend-tests.yml"
  workflow_dispatch:

jobs:
  vitest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/main/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: src/main/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test
