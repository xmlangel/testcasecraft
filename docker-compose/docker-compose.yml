services:
  testcasecraft:
    build:
      context: ..
      dockerfile: docker-compose/Dockerfile
    image: xmlangel/testcasecraft:latest
    container_name: testcasecraft
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/testcase_management}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-testcasecraft_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?err_postgres_password_not_set}
      JWT_SECRET: ${JWT_SECRET:?err_jwt_secret_not_set}
      JIRA_ENCRYPTION_KEY: ${JIRA_ENCRYPTION_KEY:?err_jira_key_not_set}
    networks:
      - testcasecraft-network
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    container_name: testcase-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-testcase_management}
      POSTGRES_USER: ${POSTGRES_USER:-testcasecraft_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?err_postgres_password_not_set}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - testcasecraft-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-testcasecraft_user} -d ${POSTGRES_DB:-testcase_management}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:

networks:
  testcasecraft-network:
    driver: bridge
