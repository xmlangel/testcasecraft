version: '3.8'

networks:
  testcase-network:
    driver: bridge

services:
  postgres-prod:
    image: postgres:latest
    container_name: testcase-postgres-prod
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - ./docker_prod_data/postgres:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - testcase-network

  app:
    build:
      context: ../
      dockerfile: ./docker-compose-prod/Dockerfile
    container_name: testcase-app-prod
    restart: unless-stopped
    depends_on:
      postgres-prod:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JIRA_ENCRYPTION_KEY=${JIRA_ENCRYPTION_KEY}
      - UPLOAD_PATH=${UPLOAD_PATH}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - SERVER_PORT=${SERVER_PORT}
    volumes:
      - ../uploads:/app/uploads
    networks:
      - testcase-network

  nginx:
    image: nginx:latest
    container_name: testcase-nginx-prod
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - testcase-network