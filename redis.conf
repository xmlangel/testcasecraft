# Production Redis 캐시 서버 최적화 설정

# 기본 설정
port 6379
bind 0.0.0.0
protected-mode yes
# requirepass는 Docker Compose 환경변수로 설정됨

# 메모리 설정
maxmemory 256mb
maxmemory-policy allkeys-lru

# 지속성 설정 (RDB + AOF)
save 900 1      # 900초(15분) 동안 최소 1번 변경시 저장
save 300 10     # 300초(5분) 동안 최소 10번 변경시 저장
save 60 10000   # 60초(1분) 동안 최소 10000번 변경시 저장

# AOF 설정 (Append Only File)
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# 성능 최적화
tcp-keepalive 300
timeout 0
tcp-backlog 511

# 로그 설정
loglevel notice
logfile ""

# 클라이언트 연결 제한
maxclients 10000

# 데이터베이스 수
databases 16

# 슬로우 로그 설정 (성능 모니터링용)
slowlog-log-slower-than 10000
slowlog-max-len 128

# 키 만료 설정
hz 10

# 압축 설정
rdbcompression yes
rdbchecksum yes

# 백그라운드 저장 실패 시 쓰기 중단 비활성화
stop-writes-on-bgsave-error no

# 마스터-슬레이브 설정 (개발 환경이므로 비활성화)
# replica-serve-stale-data yes
# replica-read-only yes