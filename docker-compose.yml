services:
  # Redis 캐시 서버
  redis:
    image: redis:7-alpine
    container_name: testcase-redis
    restart: unless-stopped
    ports:
      - "6479:6379"
    environment:
      - REDIS_PASSWORD=testcase123
    command: >
      redis-server 
      --requirepass testcase123
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - testcase-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Redis Commander (웹 기반 Redis 관리 도구)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: testcase-redis-commander
    restart: unless-stopped
    depends_on:
      - redis
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379:0:testcase123
      - HTTP_USER=admin
      - HTTP_PASSWORD=admin123
    networks:
      - testcase-network

  # Redis Insight (Redis Labs에서 제공하는 고급 Redis 관리 도구)
  redis-insight:
    image: redislabs/redisinsight:latest
    container_name: testcase-redis-insight
    restart: unless-stopped
    depends_on:
      - redis
    ports:
      - "8002:8001"
    volumes:
      - redis_insight_data:/db
    networks:
      - testcase-network

volumes:
  redis_data:
    driver: local
    name: testcase_redis_data
  redis_insight_data:
    driver: local
    name: testcase_redis_insight_data

networks:
  testcase-network:
    driver: bridge
    name: testcase-network
