version: '3.8'

services:
  # Development PostgreSQL Database
  postgres-dev:
    image: postgres:15-alpine
    container_name: testcase-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-testcase_management_dev}
      POSTGRES_USER: ${POSTGRES_USER:-testcase_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-testcase_dev_password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - ./docker_dev_data/postgres:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - testcase-dev-network
    ports:
      - "${POSTGRES_DEV_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-testcase_user} -d ${POSTGRES_DB:-testcase_management_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5

# Docker 데이터는 ./docker_dev_data/ 디렉토리에 로컬 폴더로 관리됩니다
# - postgres: ./docker_dev_data/postgres/

networks:
  testcase-dev-network:
    driver: bridge