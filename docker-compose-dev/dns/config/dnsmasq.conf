# dnsmasq 설정 파일
# 로컬 도메인 해석을 위한 DNS 서버

# 인터페이스 설정
interface=eth0
bind-interfaces

# 로컬 도메인 설정
domain=testcase.local
local=/testcase.local/

# DHCP 비활성화 (DNS만 사용)
no-dhcp-interface=eth0

# 도메인 매핑
address=/testcase.local/192.168.1.120
address=/api.testcase.local/192.168.1.120
address=/admin.testcase.local/192.168.1.120

# 상위 DNS 서버 설정
server=8.8.8.8
server=8.8.4.4
server=1.1.1.1

# 캐시 설정
cache-size=1000

# 로그 설정
log-queries
log-dhcp

# 보안 설정
bogus-priv
domain-needed
expand-hosts

# 로컬 호스트 파일 사용
no-hosts

# PTR 레코드 설정
ptr-record=120.1.168.192.in-addr.arpa,testcase.local