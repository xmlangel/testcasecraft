version: '3.8'

services:
  postgres-dev:
    image: postgres:latest
    container_name: testcase-postgres-dev
    restart: unless-stopped
    ports:
      - "${POSTGRES_DEV_PORT}:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
    driver: local
    # This maps to the docker_dev_data/postgres/ directory in the project root
    # for persistent data, as suggested by the start-dev-postgresql.sh script's
    # data initialization section.
    name: testcase-postgres-dev-data
