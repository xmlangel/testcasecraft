services:
  # PostgreSQL 데이터베이스
  testcase-craft-postgres-dev:
    image: postgres:latest
    container_name: testcase-postgres-dev
    restart: unless-stopped
    ports:
      - "${POSTGRES_DEV_PORT}:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - testcase-network

  # Spring Boot 애플리케이션
  testcraft-app:
    build:
      context: ..
      dockerfile: docker-compose-dev/Dockerfile.testcraft-app
    container_name: testcraft-app
    restart: unless-stopped
    ports:
      - "${SERVER_PORT}:8080"
    environment:
      # Spring Boot 환경변수
      SPRING_PROFILES_ACTIVE: "${SPRING_PROFILES_ACTIVE}"
      SERVER_PORT: "${SERVER_PORT}"
      
      # 데이터베이스 설정
      SPRING_DATASOURCE_URL: "${SPRING_DATASOURCE_URL}"
      SPRING_DATASOURCE_USERNAME: "${SPRING_DATASOURCE_USERNAME}"
      SPRING_DATASOURCE_PASSWORD: "${SPRING_DATASOURCE_PASSWORD}"
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: "${SPRING_DATASOURCE_DRIVER_CLASS_NAME}"
      
      # JWT 설정
      JWT_SECRET: "${JWT_SECRET}"
      JWT_EXPIRATION: "${JWT_EXPIRATION}"
      
      # 파일 업로드 설정
      SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE: "${UPLOAD_MAX_SIZE}"
      SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE: "${UPLOAD_MAX_SIZE}"
      
      # Actuator 설정
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,metrics"
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: "always"
    volumes:
      - testcraft-uploads:/app/uploads
      - testcraft-logs:/app/logs
    depends_on:
      testcase-craft-postgres-dev:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - testcase-network

  # Nginx 리버스 프록시
  nginx:
    image: nginx:alpine
    container_name: testcase-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT}:80"
      - "${NGINX_HTTPS_PORT}:443"
    volumes:
      - ./nginx/conf/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      testcase-craft-postgres-dev:
        condition: service_healthy
      testcraft-app:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - testcase-network

networks:
  testcase-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16

volumes:
  nginx-logs:
  testcraft-uploads:
  testcraft-logs:
