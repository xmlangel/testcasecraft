spring:
  application:
    name: testcase-manager-test
  datasource:
    url: jdbc:postgresql://localhost:5434/testcase_management
    driver-class-name: org.postgresql.Driver
    username: testcase_user
    password: testcase_password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
      data-locations: classpath:data-test.sql
      encoding: UTF-8
      continue-on-error: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd'T'HH:mm:ss
  aop:
    auto: false
    proxy-target-class: true

logging:
  level:
    root: INFO
    com.testcase: DEBUG
    org.springframework.web: INFO
    org.springframework.boot.autoconfigure: ERROR

jwt:
  secret: dGVzdGNhc2VfdGVzdGNhc2VfdGVzdGNhc2VfdGVzdGNhc2VfdGVzdGNhc2VfdGVzdGNhc2VfdGVzdGNhc2VfdGVzdGNhc2VfdGVzdGNhc2VfdGVzdGNhc2VfdGVzdGNhc2VfdGVzdGNhc2VfdGVzdGNhc2VfdGVzdGNhc2VfdGVzdGNhc2VfdGVzdGNhc2VfdGVzdGNhc2VfdGVzdGNhc2VfdGVzdGNhc2U=
  expiration: 3600000
  access-token-expiration: 3600000
  refresh-expiration: 7200000
  refresh-token-expiration: 7776000000

minio:
  endpoint: http://localhost:9002
  access-key: test_minio_admin
  secret-key: test_minio_password
  bucket: test-testcase-bucket
  enabled: false

rag:
  service:
    url: http://localhost:8001
    enabled: false

testcase:
  init:
    enabled: false
