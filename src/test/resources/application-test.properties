# H2 Database for testing - 랜덤 데이터베이스명으로 테스트 격리
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:testdb-${random.uuid};DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# JPA/Hibernate 설정
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Hibernate ???? ??? ?? (???)
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# log4jdbc SQL ?? ??
logging.level.jdbc.sqlonly=DEBUG
logging.level.jdbc.sqltiming=INFO
logging.level.jdbc.audit=OFF
logging.level.jdbc.resultset=OFF
logging.level.jdbc.connection=INFO
log4jdbc.dump.sql.maxlinelength=0

# 데이터베이스 연결 정보 로깅
logging.level.com.zaxxer.hikari.HikariConfig=DEBUG
logging.level.com.zaxxer.hikari.HikariDataSource=INFO
logging.level.org.springframework.boot.autoconfigure.jdbc=DEBUG

# 테스트 데이터 초기화 비활성화 (테스트용 데이터 직접 생성)
testcase.init.enabled=false

# Spring SQL 초기화 설정 (data-test.sql 자동 로드)
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data-test.sql
spring.sql.init.encoding=UTF-8
spring.jpa.defer-datasource-initialization=true

# JWT 설정 (512비트 이상 키 사용, Base64 인코딩)
jwt.secret=W1k2eDZ5M3U4cjlsOWY1NHczQCFAJCVeJipgKigkK35KNDU2NzgpKyt8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fA==
jwt.access-token-expiration=3600000
jwt.refresh-token-expiration=7776000000

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss

# ?? ?? ? SSL (?????? HTTP? ??)
server.port=0
server.ssl.enabled=false

# Spring AOP 비활성화 (AspectJ 오류 방지)
spring.aop.auto=false
spring.aop.proxy-target-class=true

# MinIO 설정 (테스트용 - 실제 연결 없이 동작)
minio.url=http://localhost:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin
minio.bucket-name=testbucket
minio.enabled=false

# RAG Service 설정 (테스트용 - 비활성화)
rag.service.enabled=false
rag.service.url=http://localhost:8001