# H2 인메모리 데이터베이스 설정 (로컬 테스트용)
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate 설정
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# H2 콘솔 활성화 (개발용)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT 설정
jwt.secret=W1k2eDZ5M3U4cjlsOWY1NHczQCFAJCVeJipgKigkK35KNDU2NzgpKyt8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fA==
jwt.expiration=31536000

# Jackson 설정
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss

# 서버 설정 (HTTP 포트 8080)
server.port=8080
server.ssl.enabled=false

# 이메일 설정 (테스트용)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=test@example.com
spring.mail.password=testpassword
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# 로깅 설정
logging.level.root=INFO
logging.level.com.testcase=DEBUG
logging.level.org.springframework.security=DEBUG

# 테스트 데이터 초기화 활성화
testcase.init.enabled=true