# Development environment with PostgreSQL
spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/testcase_management_dev}
    username: ${DATABASE_USERNAME:testcase_user}
    password: ${DATABASE_PASSWORD:testcase_dev_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT:300000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME:1200000}
  
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update  # 개발환경에서 데이터 유지 (스키마만 업데이트)
    show-sql: true
    format-sql: true
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
        format_sql: true
        use_sql_comments: true
        type: trace
  
  
  # 로깅 설정
  logging:
    level:
      org.hibernate.SQL: DEBUG
      org.hibernate.type.descriptor.sql.BasicBinder: TRACE
      com.testcase.testcasemanagement: DEBUG
    pattern:
      console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# 서버 설정
server:
  port: ${SERVER_PORT:8080}

# 관리 및 모니터링
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers,env
  endpoint:
    health:
      show-details: always

