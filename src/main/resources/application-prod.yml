# src/main/resources/application-prod.yml
# 운영 환경 전용 설정

# 운영에서는 API 문서(Swagger UI·api-docs)를 노출하지 않는다 (비인증 정보 노출 차단).
# 개발/테스트에서는 base application.yml 의 enabled=true 를 그대로 사용한다.
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# 운영용 데이터베이스 설정 (PostgreSQL)
spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/testcase_management}
    driver-class-name: org.postgresql.Driver
    username: ${DATABASE_USERNAME:testcase_user}
    password: ${DATABASE_PASSWORD:testcase_default_password}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  # 메일 설정 - 웹 UI에서 관리하므로 기본값만 설정
  mail:
    default-encoding: UTF-8
    test-connection: false

# 운영용 서버 설정
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: ${CONTEXT_PATH:/}
  compression:
    enabled: true
    min-response-size: 1024

# 운영용 액추에이터 설정 (보안 강화)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
  # 별도 포트 설정 제거 - 메인 포트에서 actuator 사용
  # server:
  #   port: ${MANAGEMENT_PORT:8083}

# 운영용 JWT 설정 (보안 강화)
jwt:
  secret: ${JWT_SECRET:default_jwt_secret_key_for_development_only_please_change_in_production_environment}
  access-token-expiration: ${JWT_ACCESS_EXPIRATION:3600000} # 1시간 (기본값, 환경변수로 재정의 가능)
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:7776000000} # 90일 (기본값, 환경변수로 재정의 가능)

# 운영용 JIRA 설정 (보안 강화)
jira:
  security:
    encryption:
      enabled: true
      # 운영 키는 반드시 환경변수 JIRA_ENCRYPTION_KEY 로 주입한다(기본값 없음).
      # 미설정 시 기동 실패(fail-closed) — 저장소에 커밋된 기본 키로 조용히 암호화되는 것을 방지.
      # 키 생성: EncryptionUtil.generateEncryptionKey() (AES-256 Base64).
      key: ${JIRA_ENCRYPTION_KEY}
    https:
      enforce: true # HTTPS 강제
      skip-ssl-verification: false # 운영에서는 강제로 무시됨(JiraSecurityConfig 가 prod 프로파일에서 우회 차단)
  connection:
    timeout: ${JIRA_CONNECTION_TIMEOUT:30000}
    read-timeout: ${JIRA_READ_TIMEOUT:60000}
    retry:
      max-attempts: ${JIRA_RETRY_MAX_ATTEMPTS:3}
      delay: ${JIRA_RETRY_DELAY:1000}
  connection-pool:
    enabled: true
    max-connections: ${JIRA_CONNECTION_POOL_MAX:20}
    idle-timeout: ${JIRA_CONNECTION_POOL_IDLE_TIMEOUT:300000}
  cache:
    enabled: true
    ttl: ${JIRA_CACHE_TTL:300000} # 5분
    max-entries: ${JIRA_CACHE_MAX_ENTRIES:1000}
  monitoring:
    health-check:
      interval: ${JIRA_HEALTH_CHECK_INTERVAL:3600000} # 1시간
      enabled: true
    enabled: true
    metric-retention-hours: ${JIRA_MONITORING_RETENTION:72} # 3일
  audit-log:
    enabled: ${JIRA_AUDIT_LOG_ENABLED:true}
    file-path: ${JIRA_AUDIT_LOG_PATH:/var/log/testcase/jira-audit.log}
    include-sensitive: false # 민감정보 제외

# 운영용 로깅 설정 (보안 및 성능 최적화)
logging:
  level:
    com.testcase.testcasemanagement: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.springframework.web: WARN
    org.springframework.transaction: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: ${LOG_FILE:/var/log/testcase/application.log}
    max-size: ${LOG_MAX_SIZE:50MB}
    max-history: ${LOG_MAX_HISTORY:30}
    total-size-cap: ${LOG_TOTAL_SIZE:1GB}
# 운영용 보안 설정
# SSL 강제는 Nginx/Load Balancer 레벨에서 처리
# security:
#   require-ssl: true
#   headers:
#     frame: DENY
#     content-type: nosniff
#     xss-protection: true

# Rate limit 클라이언트 IP 산정 (RateLimiterFilter)
# 기본(false): 소켓 주소(getRemoteAddr) 사용 — 헤더 스푸핑으로 IP를 회전해 우회하는 것을 차단.
# 리버스 프록시(Nginx/LB) 뒤에 배포하면 모든 요청 출발지가 프록시 IP 하나로 합산되므로,
# 프록시가 X-Forwarded-For 를 신뢰 가능하게 덮어쓰는(클라이언트 위조분 제거) 구성일 때만 true 로 켠다.
# 프록시 없이 Spring Boot 직접 노출(docker-compose-build no-nginx) 모드면 반드시 false 유지.
app:
  ratelimit:
    trust-forwarded-headers: ${APP_RATELIMIT_TRUST_FORWARDED_HEADERS:false}
  jira:
    # SSRF 가드 (JiraApiService.normalizeServerUrl)
    # 기본 false: Jira 서버 URL 이 루프백/사설/링크로컬(클라우드 메타데이터 169.254.169.254 포함) 로
    # 향하면 아웃바운드 요청을 거부한다.
    # 내부 IP 로 운영되는 신뢰된 on-prem Jira 를 연동해야 하는 배포에서만 true 로 켠다.
    allow-private-targets: ${APP_JIRA_ALLOW_PRIVATE_TARGETS:false}
