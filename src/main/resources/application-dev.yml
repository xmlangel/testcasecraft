# src/main/resources/application-dev.yml
# 개발 환경 전용 설정

# 개발용 데이터베이스 설정 (H2 파일 기반 - 빌드 안전 위치)
spring:
  datasource:
    url: jdbc:h2:file:../h2-database-safe/testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  
  # 개발용 메일 설정
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:kimxmlangelsmtp@gmail.com}
    password: ${MAIL_PASSWORD:itfd zamb yfcp fczv}
    default-encoding: UTF-8
    test-connection: false
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: false
          ssl:
            enable: false
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
        debug: false

# 개발용 서버 설정
server:
  port: 8080

# 개발용 데이터 초기화 설정
testcase:
  init:
    enabled: true

# 개발용 액추에이터 설정 (모든 엔드포인트 노출)
management:
  endpoints:
    web:
      exposure:
        include: "*"
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      show-components: always
  # 별도 포트 설정 제거 - 메인 포트 8080에서 함께 서비스
  # server:
  #   port: 8083

# 개발용 JWT 설정 (짧은 만료 시간) - Base64 인코딩
jwt:
  secret: ZGV2NTEyYml0c2VjcmV0a2V5aGVyZTEyMzQ1Njc4OTBhYmNkZWZnaGlqa2xtbm9wcXJzdHV2d3h5ejEyMzQ1Njc4OTBhYmNkZWZnaGlqa2xtbm9wcXJzdHV2d3h5eg==
  access-token-expiration: 3600000   # 1시간 (60 * 60 * 1000)
  refresh-token-expiration: 7776000000 # 90일 (90 * 24 * 60 * 60 * 1000)

# 개발용 JIRA 설정 (테스트용)
app:
  jira:
    server-url: https://kwangmyung.atlassian.net

jira:
  security:
    encryption:
      enabled: true
      key: ${JIRA_ENCRYPTION_KEY:5CBRv5FwesBJkQ7ecX1KGCxyUQTcnE1CkkGBYDswb2Y=}
    https:
      enforce: false  # 개발환경에서는 HTTP도 허용
      skip-ssl-verification: true  # 개발환경에서는 SSL 검증 스킵
  connection:
    timeout: 10000   # 10초 (빠른 디버깅)
    read-timeout: 30000  # 30초
  cache:
    enabled: true
    ttl: 60000  # 1분 (짧은 캐시)
    max-entries: 100
  monitoring:
    health-check:
      interval: 600000  # 10분 (개발환경에서는 자주 체크)
      enabled: true
    enabled: true
    metric-retention-hours: 24  # 1일
  audit-log:
    enabled: true  # 개발환경에서는 로그 활성화
    file-path: ./logs/dev-jira-audit.log

# 개발용 로깅 설정
logging:
  level:
    com.testcase.testcasemanagement: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: ./logs/dev-application.log
    max-size: 10MB
    max-history: 5