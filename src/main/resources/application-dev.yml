# src/main/resources/application-dev.yml
# 개발 환경 전용 설정

# 개발용 데이터베이스 설정 (H2 파일 기반)
spring:
  datasource:
    url: jdbc:h2:file:./data/testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  # 개발용 Redis 설정 (ICT-195)
  data:
    redis:
      host: localhost
      port: 6479  # Docker 컨테이너 포트에 맞춤
      password: testcase123  # Docker Compose에서 설정된 비밀번호
      timeout: 2000ms
      database: 0
      jedis:
        pool:
          max-active: 4   # 개발환경용 작은 풀 사이즈
          max-idle: 2
          min-idle: 0
          max-wait: 1000ms
  cache:
    type: redis
    redis:
      time-to-live: 300000  # 5분 (개발환경용 짧은 TTL)

# 개발용 서버 설정
server:
  port: 8080

# 개발용 액추에이터 설정 (모든 엔드포인트 노출)
management:
  endpoints:
    web:
      exposure:
        include: "*"
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      show-components: always
  server:
    port: 8083

# 개발용 JWT 설정 (짧은 만료 시간)
jwt:
  secret: dev512bitsecretkeyhere1234567890abcdefghijklmnopqrstuvwxyz1234567890abcdefghijklmnopqrstuvwxyz
  access-token-expiration: 3600000   # 1시간
  refresh-token-expiration: 86400000 # 1일

# 개발용 JIRA 설정 (테스트용)
jira:
  security:
    encryption:
      enabled: true
      key: ${JIRA_ENCRYPTION_KEY:5CBRv5FwesBJkQ7ecX1KGCxyUQTcnE1CkkGBYDswb2Y=}
    https:
      enforce: false  # 개발환경에서는 HTTP도 허용
      skip-ssl-verification: true  # 개발환경에서는 SSL 검증 스킵
  connection:
    timeout: 10000   # 10초 (빠른 디버깅)
    read-timeout: 30000  # 30초
  cache:
    enabled: true
    ttl: 60000  # 1분 (짧은 캐시)
    max-entries: 100
  monitoring:
    health-check:
      interval: 600000  # 10분 (개발환경에서는 자주 체크)
      enabled: true
    enabled: true
    metric-retention-hours: 24  # 1일
  audit-log:
    enabled: true  # 개발환경에서는 로그 활성화
    file-path: ./logs/dev-jira-audit.log

# 개발용 로깅 설정
logging:
  level:
    com.testcase.testcasemanagement: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: ./logs/dev-application.log
    max-size: 10MB
    max-history: 5