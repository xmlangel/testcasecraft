# src/main/resources/application.yml
jwt:
  secret: your256bitsecretkeyhere1234567890abcdefghijklmnopqrstuvwxyz
  access-token-expiration: 900000 # 15분 (900초)
  refresh-token-expiration: 604800000 # 7일 (604800초)

spring:
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: your-google-client-id
            client-secret: your-google-client-secret
            scope: email,profile

# SpringDoc OpenAPI 설정
springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true
    disable-swagger-default-url: true
    doc-expansion: none
  show-actuator: false
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
