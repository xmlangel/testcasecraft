services:
  # Spring Boot Application
  app:
    image: xmlangel/testcasecraft:1.0.96
    container_name: testcasecraft
    environment:
      # Spring Profile
      - SPRING_PROFILES_ACTIVE=prod

      # Protocol and Domain Configuration
      - PROTOCOL=${PROTOCOL}
      - DOMAIN=${DOMAIN}

      # Server Configuration
      - SERVER_PORT=${SERVER_PORT}

      # Database Configuration
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_USERNAME=${POSTGRES_USER}
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD}

      # JWT Configuration
      # JWT_SECRET 미설정 시 컨테이너가 자동 생성 후 /app/data/jwt-secret 에 영속화
      - JWT_SECRET=${JWT_SECRET:-}
      - JWT_EXPIRATION=${JWT_EXPIRATION}
      - JWT_REFRESH_EXPIRATION=${JWT_REFRESH_EXPIRATION}

      # Application Configuration
      - SPRING_JPA_HIBERNATE_DDL_AUTO=${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      - SHOW_EXPLORATORY_SESSION_TAB=${SHOW_EXPLORATORY_SESSION_TAB:-false}

      - SPRING_JPA_SHOW_SQL=false
      - LOGGING_LEVEL_COM_TESTCASE=INFO
      - LOGGING_LEVEL_ROOT=WARN
      - RAG_API_URL=http://rag-service:8000
      - TESTCASE_INIT_ENABLED=${TESTCASE_INIT_ENABLED:-false}

      # MinIO Configuration (TestCase Attachments)
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_TESTCASE_BUCKET=testcase-attachments
      - MINIO_SECURE=false

      # Mail Configuration (optional - can be empty for development)
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
      - MAIL_HOST=${MAIL_HOST:-localhost}
      - MAIL_PORT=${MAIL_PORT:-587}

      # Frontend API Configuration
      - REACT_APP_API_BASE_URL=${REACT_APP_API_BASE_URL:-http://localhost:8080}

      # Graph DB (AgensGraph) — features.graph.enabled=false 면 앱은 그래프 없이 기존과 동일 동작
      - FEATURES_GRAPH_ENABLED=${FEATURES_GRAPH_ENABLED:-false}
      - GRAPH_DB_URL=${GRAPH_DB_URL:-jdbc:postgresql://agensgraph:5432/tc_graph_db}
      - GRAPH_DB_USERNAME=${GRAPH_DB_USERNAME:-graph_user}
      - GRAPH_DB_PASSWORD=${GRAPH_DB_PASSWORD:-}
    ports:
      - "${HTTP_PORT}:${SERVER_PORT}"
      - "${HTTPS_PORT}:${SERVER_PORT}"
    volumes:
      # 자동 생성된 JWT_SECRET 영속화 (컨테이너 재생성에도 세션 유지)
      - ./data/app:/app/data
    networks:
      - testcasecraft-network
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      # busybox wget 사용 (1.0.84+ 이미지는 보안상 curl 미포함)
      test:
        [
          "CMD-SHELL",
          "wget -q --no-check-certificate -O /dev/null ${PROTOCOL}://localhost:${SERVER_PORT}/actuator/health || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: always

  # FastAPI RAG Service
  rag-service:
    image: xmlangel/testcasecraft-rag-service:1.0.11
    container_name: testcasecraft-rag-service
    environment:
      # Database (통합 단일 PostgreSQL 인스턴스의 rag_db 를 사용)
      DATABASE_URL: postgresql://rag_user:${POSTGRES_RAG_PASSWORD}@postgres:5432/rag_db

      # MinIO (Docker Compose MinIO 사용)
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: rag-documents
      MINIO_SECURE: "false"

      # Document Parser Configuration
      # Options: upstage, pymupdf, pymupdf4llm, pypdf2, auto
      # Using pymupdf4llm for LLM-optimized markdown extraction (no API key required)
      DOCUMENT_PARSER: ${DOCUMENT_PARSER:-pymupdf4llm}

      # Upstage API (not used when using pymupdf4llm)
      UPSTAGE_API_KEY: ${UPSTAGE_API_KEY:-your_upstage_api_key}

      # Application
      APP_ENV: development
      LOG_LEVEL: DEBUG
    ports:
      - "8001:8000"
    networks:
      - testcasecraft-network
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: always

  # PostgreSQL 18 with pgvector — 통합 단일 인스턴스
  #   - testcase_management (앱 DB, testcase_user)
  #   - rag_db (RAG 벡터 DB, rag_user) : init-scripts 가 최초 기동 시 자동 생성
  # 신규 배포는 init-scripts 로 rag_db 가 자동 생성되고, 기존 배포는
  # scripts/migrate-consolidate-db.sh 로 rag_db 데이터를 이관한다.
  postgres:
    image: pgvector/pgvector:pg18
    container_name: testcasecraft-postgres
    environment:
      POSTGRES_DB: testcase_management
      POSTGRES_USER: testcase_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # 최초 기동 시 rag_user/rag_db 생성에 사용 (init-scripts/01-init-rag.sh)
      POSTGRES_RAG_PASSWORD: ${POSTGRES_RAG_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - testcasecraft-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testcase_user -d testcase_management"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # AgensGraph — 테스트케이스·오류 그래프 (docs/graph-db/AGENSGRAPH_TESTCASE_GRAPH_PLAN.md)
  #   PG16.9 기반이라 메인 postgres(pg18)와 별도 인스턴스로 병존한다.
  #   FEATURES_GRAPH_ENABLED=false(기본)면 앱은 이 서비스 없이도 기존과 동일하게 동작.
  agensgraph:
    image: skaiworldwide/agensgraph:v2.16.0-bookworm
    container_name: testcasecraft-agensgraph
    environment:
      POSTGRES_DB: tc_graph_db
      POSTGRES_USER: graph_user
      POSTGRES_PASSWORD: ${GRAPH_DB_PASSWORD:-changeme-graph}
    ports:
      # 개발 머신에서 5435/5436 을 다른 AgensGraph 가 쓰는 경우가 있어 5437 기본
      - "${GRAPH_DB_PORT:-5437}:5432"
    volumes:
      - ./data/agensgraph:/var/lib/postgresql/data
      - ./init-scripts-graph:/docker-entrypoint-initdb.d
    networks:
      - testcasecraft-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U graph_user -d tc_graph_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # MinIO Object Storage — 앱/RAG 공용 단일 인스턴스
  #   - testcase-attachments 버킷 (앱 첨부파일)
  #   - rag-documents 버킷 (RAG 문서)
  minio:
    image: minio/minio:latest
    container_name: testcasecraft-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console
    volumes:
      - ./data/minio:/data
    networks:
      - testcasecraft-network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

networks:
  testcasecraft-network:
    name: testcasecraft-network-spring
    driver: bridge
