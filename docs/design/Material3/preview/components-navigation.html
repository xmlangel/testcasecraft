<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Roboto',sans-serif; background:#F3EDF7; padding:0; display:flex; gap:0; height:150px; overflow:hidden; }

/* Nav Bar (bottom) */
.nav-bar { background:#ECE6F0; display:flex; flex-direction:column; width:320px; }
.nav-bar-inner { display:flex; flex:1; align-items:center; justify-content:space-around; padding:12px 0 8px; }
.nav-item { display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; flex:1; }
.nav-indicator { width:64px; height:32px; border-radius:9999px; display:flex; align-items:center; justify-content:center; font-size:22px; }
.nav-item.active .nav-indicator { background:#D0BCFF; }
.nav-label { font-size:12px; font-weight:500; color:#49454F; }
.nav-item.active .nav-label { color:#1D192B; font-weight:500; }

/* Nav Rail */
.nav-rail { background:#ECE6F0; width:80px; display:flex; flex-direction:column; align-items:center; padding:12px 0; gap:4px; }
.rail-item { display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; width:100%; padding:4px 0; }
.rail-indicator { width:56px; height:32px; border-radius:9999px; display:flex; align-items:center; justify-content:center; font-size:20px; }
.rail-item.active .rail-indicator { background:#D0BCFF; }
.rail-label { font-size:11px; font-weight:500; color:#49454F; }
.rail-item.active .rail-label { color:#1D192B; }

/* Tabs */
.tabs { background:#FFFBFE; flex:1; display:flex; flex-direction:column; }
.tab-bar { display:flex; border-bottom:2px solid #CAC4D0; }
.tab { flex:1; padding:12px 0 10px; display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; position:relative; }
.tab-icon { font-size:18px; color:#49454F; }
.tab-label { font-size:12px; font-weight:500; color:#49454F; }
.tab.active .tab-icon, .tab.active .tab-label { color:#6750A4; }
.tab.active::after { content:''; position:absolute; bottom:-2px; left:0; right:0; height:3px; background:#6750A4; border-radius:3px 3px 0 0; }
.tab-content { padding:12px 16px; font-size:13px; color:#49454F; }
</style>
</head><body>
<div class="nav-rail">
  <div class="rail-item active"><div class="rail-indicator">⊞</div><div class="rail-label">Home</div></div>
  <div class="rail-item"><div class="rail-indicator">♡</div><div class="rail-label">Saved</div></div>
  <div class="rail-item"><div class="rail-indicator">◎</div><div class="rail-label">Explore</div></div>
  <div class="rail-item"><div class="rail-indicator">☰</div><div class="rail-label">More</div></div>
</div>
<div style="flex:1;display:flex;flex-direction:column;">
  <div class="tabs">
    <div class="tab-bar">
      <div class="tab active"><div class="tab-icon">⊞</div><div class="tab-label">Tab one</div></div>
      <div class="tab"><div class="tab-icon">♡</div><div class="tab-label">Tab two</div></div>
      <div class="tab"><div class="tab-icon">◎</div><div class="tab-label">Tab three</div></div>
    </div>
    <div class="tab-content">Tab content area</div>
  </div>
  <div class="nav-bar">
    <div class="nav-bar-inner">
      <div class="nav-item active"><div class="nav-indicator">⊞</div><div class="nav-label">Home</div></div>
      <div class="nav-item"><div class="nav-indicator">♡</div><div class="nav-label">Saved</div></div>
      <div class="nav-item"><div class="nav-indicator">◎</div><div class="nav-label">Explore</div></div>
      <div class="nav-item"><div class="nav-indicator">☺</div><div class="nav-label">Profile</div></div>
    </div>
  </div>
</div>
</body></html>
