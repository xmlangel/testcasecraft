<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Roboto', sans-serif; background: #F7F2FA; padding: 16px; }
.grid { display:flex; flex-wrap:wrap; gap: 8px; }
.item { background:#fff; border-radius:8px; padding:8px 10px; display:flex; align-items:center; gap:10px; min-width:100px; }
.bar { background:#6750A4; border-radius:2px; height:12px; flex-shrink:0; }
.info { display:flex; flex-direction:column; gap:1px; }
.name { font-size:10px; font-weight:500; color:#1C1B1F; }
.val { font-size:9px; color:#79747E; }
.label { font-size:11px; font-weight:500; color:#49454F; margin-bottom:8px; letter-spacing:0.5px; text-transform:uppercase; }
</style>
</head><body>
<div class="label">Spacing Scale (4px grid)</div>
<div class="grid">
  <div class="item"><div class="bar" style="width:4px"></div><div class="info"><div class="name">space-1</div><div class="val">4px</div></div></div>
  <div class="item"><div class="bar" style="width:8px"></div><div class="info"><div class="name">space-2</div><div class="val">8px</div></div></div>
  <div class="item"><div class="bar" style="width:12px"></div><div class="info"><div class="name">space-3</div><div class="val">12px</div></div></div>
  <div class="item"><div class="bar" style="width:16px"></div><div class="info"><div class="name">space-4</div><div class="val">16px</div></div></div>
  <div class="item"><div class="bar" style="width:20px"></div><div class="info"><div class="name">space-5</div><div class="val">20px</div></div></div>
  <div class="item"><div class="bar" style="width:24px"></div><div class="info"><div class="name">space-6</div><div class="val">24px</div></div></div>
  <div class="item"><div class="bar" style="width:32px"></div><div class="info"><div class="name">space-8</div><div class="val">32px</div></div></div>
  <div class="item"><div class="bar" style="width:40px"></div><div class="info"><div class="name">space-10</div><div class="val">40px</div></div></div>
  <div class="item"><div class="bar" style="width:48px"></div><div class="info"><div class="name">space-12</div><div class="val">48px</div></div></div>
  <div class="item"><div class="bar" style="width:64px"></div><div class="info"><div class="name">space-16</div><div class="val">64px</div></div></div>
</div>
</body></html>
