<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Roboto',sans-serif; background:#F3EDF7; padding:16px; display:flex; gap:12px; align-items:flex-end; flex-wrap:wrap; }
.card { width:88px; border-radius:12px; background:#FFFBFE; display:flex; flex-direction:column; align-items:center; padding:16px 8px 10px; gap:10px; }
.name { font-size:10px; font-weight:500; color:#49454F; }
.val { font-size:9px; color:#79747E; text-align:center; }
</style>
</head><body>
  <div class="card" style="box-shadow:none;background:#ECE6F0">
    <div class="name">Level 0</div>
    <div class="val">No shadow</div>
  </div>
  <div class="card" style="box-shadow:0 1px 2px rgba(0,0,0,0.3),0 1px 3px rgba(0,0,0,0.15)">
    <div class="name">Level 1</div>
    <div class="val">1dp</div>
  </div>
  <div class="card" style="box-shadow:0 1px 2px rgba(0,0,0,0.3),0 2px 6px rgba(0,0,0,0.15)">
    <div class="name">Level 2</div>
    <div class="val">3dp</div>
  </div>
  <div class="card" style="box-shadow:0 4px 8px rgba(0,0,0,0.3),0 1px 3px rgba(0,0,0,0.15)">
    <div class="name">Level 3</div>
    <div class="val">6dp</div>
  </div>
  <div class="card" style="box-shadow:0 6px 10px rgba(0,0,0,0.3),0 2px 3px rgba(0,0,0,0.15)">
    <div class="name">Level 4</div>
    <div class="val">8dp</div>
  </div>
  <div class="card" style="box-shadow:0 8px 12px rgba(0,0,0,0.3),0 4px 4px rgba(0,0,0,0.15)">
    <div class="name">Level 5</div>
    <div class="val">12dp</div>
  </div>
</body></html>
