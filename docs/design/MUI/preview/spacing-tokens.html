<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: "Roboto", sans-serif; background: #fff; padding: 16px; }
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; margin-bottom: 16px; }
  .box { background: rgba(151,71,255,0.12); border-radius: 2px; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 4px; }
  .val { font-size: 8px; font-weight: 500; color: #6B21C7; }
  .row { display: flex; gap: 6px; align-items: center; margin-bottom: 8px; }
  .label { font-size: 9px; color: rgba(0,0,0,0.4); width: 48px; text-align: right; font-family: "Roboto Mono", monospace; }
  .bar { background: #9747FF; border-radius: 2px; height: 12px; }
  .barlabel { font-size: 9px; color: rgba(0,0,0,0.5); margin-left: 4px; font-family: "Roboto Mono", monospace; }
  .section { font-size: 9px; font-weight: 500; color: rgba(0,0,0,0.4); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; margin-top: 4px; }
</style>
</head>
<body>
  <div class="section">Spacing Scale (base 8px)</div>
  <div class="grid">
    <div class="box" style="height:8px"><span class="val">4</span></div>
    <div class="box" style="height:16px"><span class="val">8</span></div>
    <div class="box" style="height:24px"><span class="val">12</span></div>
    <div class="box" style="height:32px"><span class="val">16</span></div>
    <div class="box" style="height:48px"><span class="val">24</span></div>
    <div class="box" style="height:64px"><span class="val">32</span></div>
    <div class="box" style="height:80px"><span class="val">40</span></div>
    <div class="box" style="height:96px"><span class="val">48</span></div>
  </div>

  <div class="section">Border Radius</div>
  <div class="row">
    <div class="label">2px</div>
    <div style="width:40px;height:18px;border:2px solid #9747FF;border-radius:2px"></div>
    <span class="barlabel">sm — subtle</span>
  </div>
  <div class="row">
    <div class="label">4px</div>
    <div style="width:40px;height:18px;border:2px solid #9747FF;border-radius:4px"></div>
    <span class="barlabel">default — cards, buttons, inputs</span>
  </div>
  <div class="row">
    <div class="label">8px</div>
    <div style="width:40px;height:18px;border:2px solid #9747FF;border-radius:8px"></div>
    <span class="barlabel">md — dialogs</span>
  </div>
  <div class="row">
    <div class="label">100px</div>
    <div style="width:64px;height:18px;border:2px solid #9747FF;border-radius:100px"></div>
    <span class="barlabel">pill — chips</span>
  </div>
  <div class="row">
    <div class="label">50%</div>
    <div style="width:24px;height:24px;border:2px solid #9747FF;border-radius:50%"></div>
    <span class="barlabel">circle — avatars, FABs</span>
  </div>
</body>
</html>
