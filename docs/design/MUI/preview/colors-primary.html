<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: "Roboto", sans-serif; background: #fff; padding: 16px; }
  .row { display: flex; gap: 4px; margin-bottom: 12px; }
  .swatch { flex: 1; height: 56px; border-radius: 4px; display: flex; flex-direction: column; justify-content: flex-end; padding: 4px 6px; }
  .swatch span { font-size: 9px; font-weight: 500; }
  .label { font-size: 10px; color: rgba(0,0,0,0.6); margin-bottom: 4px; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="label">Primary — Purple</div>
  <div class="row">
    <div class="swatch" style="background:#F3E8FF"><span style="color:rgba(0,0,0,0.6)">50</span></div>
    <div class="swatch" style="background:#E0CAFF"><span style="color:rgba(0,0,0,0.6)">100</span></div>
    <div class="swatch" style="background:#C19EFF"><span style="color:rgba(0,0,0,0.6)">200</span></div>
    <div class="swatch" style="background:#A371FF"><span style="color:#fff">300</span></div>
    <div class="swatch" style="background:#9747FF"><span style="color:#fff">400 ★</span></div>
    <div class="swatch" style="background:#8123F5"><span style="color:#fff">500</span></div>
    <div class="swatch" style="background:#6B21C7"><span style="color:#fff">600</span></div>
    <div class="swatch" style="background:#581DA3"><span style="color:#fff">700</span></div>
    <div class="swatch" style="background:#3D1080"><span style="color:#fff">800</span></div>
    <div class="swatch" style="background:#1E0545"><span style="color:#fff">900</span></div>
  </div>
  <div class="label">Secondary — Deep Purple</div>
  <div class="row">
    <div class="swatch" style="background:#F3E5F5"><span style="color:rgba(0,0,0,0.6)">50</span></div>
    <div class="swatch" style="background:#E1BEE7"><span style="color:rgba(0,0,0,0.6)">100</span></div>
    <div class="swatch" style="background:#CE93D8"><span style="color:rgba(0,0,0,0.6)">200</span></div>
    <div class="swatch" style="background:#BA68C8"><span style="color:#fff">300</span></div>
    <div class="swatch" style="background:#AB47BC"><span style="color:#fff">400</span></div>
    <div class="swatch" style="background:#9C27B0"><span style="color:#fff">500 ★</span></div>
    <div class="swatch" style="background:#8E24AA"><span style="color:#fff">600</span></div>
    <div class="swatch" style="background:#7B1FA2"><span style="color:#fff">700</span></div>
    <div class="swatch" style="background:#6A1B9A"><span style="color:#fff">800</span></div>
    <div class="swatch" style="background:#4A148C"><span style="color:#fff">900</span></div>
  </div>
</body>
</html>
