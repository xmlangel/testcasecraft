<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: "Roboto", sans-serif; background: #fff; padding: 20px 24px; }
  .section { font-size: 9px; font-weight: 500; color: rgba(0,0,0,0.4); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; margin-top: 14px; }
  .row { display: flex; gap: 16px; align-items: flex-start; flex-wrap: wrap; margin-bottom: 8px; }

  .tf { position: relative; display: inline-flex; flex-direction: column; }
  .tf-outlined { border: 1px solid rgba(0,0,0,0.23); border-radius: 4px; padding: 14px 14px 14px; font-size: 16px; font-family: "Roboto",sans-serif; outline: none; width: 200px; color: rgba(0,0,0,0.87); background: transparent; }
  .tf-outlined:focus { border: 2px solid #9747FF; padding: 13px 13px 13px; }
  .tf-label { position: absolute; top: -9px; left: 10px; background: #fff; padding: 0 4px; font-size: 12px; color: #9747FF; font-family: "Roboto",sans-serif; pointer-events: none; }
  .tf-label-inactive { color: rgba(0,0,0,0.6); top: 15px; left: 14px; font-size: 16px; }

  /* Chip */
  .chip { display: inline-flex; align-items: center; gap: 4px; height: 32px; padding: 0 12px; border-radius: 16px; font-size: 13px; font-weight: 400; font-family: "Roboto",sans-serif; }
  .chip-filled { background: rgba(0,0,0,0.08); color: rgba(0,0,0,0.87); }
  .chip-outlined { background: transparent; border: 1px solid rgba(0,0,0,0.23); color: rgba(0,0,0,0.87); }
  .chip-primary { background: rgba(151,71,255,0.12); color: #6B21C7; }
  .chip-error { background: rgba(211,47,47,0.12); color: #D32F2F; }

  /* Checkbox */
  .cb-wrap { display: flex; align-items: center; gap: 8px; font-size: 14px; color: rgba(0,0,0,0.87); cursor: pointer; }
  input[type=checkbox] { width: 18px; height: 18px; accent-color: #9747FF; }
  input[type=radio] { width: 18px; height: 18px; accent-color: #9747FF; }
</style>
</head>
<body>
  <div class="section">Text Fields — Outlined</div>
  <div class="row">
    <div class="tf">
      <label class="tf-label">Email</label>
      <input class="tf-outlined" value="user@example.com" readonly>
    </div>
    <div class="tf">
      <label class="tf-label tf-label-inactive">Password</label>
      <input class="tf-outlined" type="password" readonly>
    </div>
    <div class="tf">
      <label class="tf-label" style="color:#D32F2F">Error field</label>
      <input class="tf-outlined" value="bad input" readonly style="border-color:#D32F2F;">
    </div>
  </div>

  <div class="section">Chips</div>
  <div class="row">
    <span class="chip chip-filled">Default</span>
    <span class="chip chip-outlined">Outlined</span>
    <span class="chip chip-primary">
      <span class="material-icons" style="font-size:16px">check</span> Primary
    </span>
    <span class="chip chip-error">Error</span>
    <span class="chip chip-filled" style="opacity:0.38">Disabled</span>
    <span class="chip chip-filled" style="background:rgba(0,0,0,0.08)">
      Avatar
      <span class="material-icons" style="font-size:16px;color:rgba(0,0,0,0.38)">cancel</span>
    </span>
  </div>

  <div class="section">Checkbox &amp; Radio</div>
  <div class="row">
    <label class="cb-wrap"><input type="checkbox" checked> Checked</label>
    <label class="cb-wrap"><input type="checkbox"> Unchecked</label>
    <label class="cb-wrap"><input type="checkbox" disabled> Disabled</label>
    <label class="cb-wrap"><input type="radio" name="r" checked> Option A</label>
    <label class="cb-wrap"><input type="radio" name="r"> Option B</label>
  </div>

  <div class="section">Switch</div>
  <div class="row">
    <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:14px;color:rgba(0,0,0,0.87)">
      <input type="checkbox" style="width:34px;height:20px;accent-color:#9747FF" checked> On
    </label>
    <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:14px;color:rgba(0,0,0,0.87)">
      <input type="checkbox" style="width:34px;height:20px;accent-color:#9747FF"> Off
    </label>
  </div>
</body>
</html>
