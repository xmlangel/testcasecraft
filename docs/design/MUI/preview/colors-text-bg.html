<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: "Roboto", sans-serif; background: #f5f5f5; padding: 16px; }
  .row { display: flex; gap: 8px; margin-bottom: 10px; }
  .tile { flex: 1; border-radius: 4px; padding: 10px 12px; display: flex; flex-direction: column; gap: 2px; }
  .tile .label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.6px; font-weight: 500; margin-bottom: 2px; }
  .tile .hex { font-size: 9px; font-family: "Roboto Mono", monospace; }
  .section { font-size: 9px; font-weight: 500; color: rgba(0,0,0,0.5); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
</style>
</head>
<body>
  <div class="section">Text — Light Mode</div>
  <div class="row">
    <div class="tile" style="background:#fff; border:1px solid #e0e0e0">
      <div class="label" style="color:rgba(0,0,0,0.6)">Token</div>
      <div style="font-size:13px; font-weight:500; color:rgba(0,0,0,0.87)">Primary</div>
      <div class="hex" style="color:rgba(0,0,0,0.38)">rgba(0,0,0,.87)</div>
    </div>
    <div class="tile" style="background:#fff; border:1px solid #e0e0e0">
      <div class="label" style="color:rgba(0,0,0,0.6)">Token</div>
      <div style="font-size:13px; font-weight:500; color:rgba(0,0,0,0.60)">Secondary</div>
      <div class="hex" style="color:rgba(0,0,0,0.38)">rgba(0,0,0,.60)</div>
    </div>
    <div class="tile" style="background:#fff; border:1px solid #e0e0e0">
      <div class="label" style="color:rgba(0,0,0,0.6)">Token</div>
      <div style="font-size:13px; font-weight:500; color:rgba(0,0,0,0.38)">Disabled</div>
      <div class="hex" style="color:rgba(0,0,0,0.38)">rgba(0,0,0,.38)</div>
    </div>
  </div>

  <div class="section">Backgrounds</div>
  <div class="row">
    <div class="tile" style="background:#FFFFFF; border:1px solid #e0e0e0">
      <div class="label" style="color:rgba(0,0,0,0.4)">Paper</div>
      <div class="hex" style="color:rgba(0,0,0,0.38)">#FFFFFF</div>
    </div>
    <div class="tile" style="background:#F5F5F5; border:1px solid #e0e0e0">
      <div class="label" style="color:rgba(0,0,0,0.4)">Default</div>
      <div class="hex" style="color:rgba(0,0,0,0.38)">#F5F5F5</div>
    </div>
    <div class="tile" style="background:#121212">
      <div class="label" style="color:rgba(255,255,255,0.5)">Dark</div>
      <div class="hex" style="color:rgba(255,255,255,0.4)">#121212</div>
    </div>
    <div class="tile" style="background:#1E1E1E">
      <div class="label" style="color:rgba(255,255,255,0.5)">Dark Paper</div>
      <div class="hex" style="color:rgba(255,255,255,0.4)">#1E1E1E</div>
    </div>
  </div>

  <div class="section">Grays</div>
  <div class="row" style="gap:3px">
    <div style="flex:1;height:28px;border-radius:3px;background:#FAFAFA"></div>
    <div style="flex:1;height:28px;border-radius:3px;background:#F5F5F5"></div>
    <div style="flex:1;height:28px;border-radius:3px;background:#EEEEEE"></div>
    <div style="flex:1;height:28px;border-radius:3px;background:#E0E0E0"></div>
    <div style="flex:1;height:28px;border-radius:3px;background:#BDBDBD"></div>
    <div style="flex:1;height:28px;border-radius:3px;background:#9E9E9E"></div>
    <div style="flex:1;height:28px;border-radius:3px;background:#757575"></div>
    <div style="flex:1;height:28px;border-radius:3px;background:#616161"></div>
    <div style="flex:1;height:28px;border-radius:3px;background:#424242"></div>
    <div style="flex:1;height:28px;border-radius:3px;background:#212121"></div>
  </div>
  <div class="row" style="gap:3px; margin-top:2px">
    <div style="flex:1"><span style="font-size:8px;color:rgba(0,0,0,0.4)">50</span></div>
    <div style="flex:1"><span style="font-size:8px;color:rgba(0,0,0,0.4)">100</span></div>
    <div style="flex:1"><span style="font-size:8px;color:rgba(0,0,0,0.4)">200</span></div>
    <div style="flex:1"><span style="font-size:8px;color:rgba(0,0,0,0.4)">300</span></div>
    <div style="flex:1"><span style="font-size:8px;color:rgba(0,0,0,0.4)">400</span></div>
    <div style="flex:1"><span style="font-size:8px;color:rgba(0,0,0,0.4)">500</span></div>
    <div style="flex:1"><span style="font-size:8px;color:rgba(0,0,0,0.4)">600</span></div>
    <div style="flex:1"><span style="font-size:8px;color:rgba(0,0,0,0.4)">700</span></div>
    <div style="flex:1"><span style="font-size:8px;color:rgba(0,0,0,0.4)">800</span></div>
    <div style="flex:1"><span style="font-size:8px;color:rgba(0,0,0,0.4)">900</span></div>
  </div>
</body>
</html>
