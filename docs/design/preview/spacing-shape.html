<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Roboto',sans-serif; background:#F7F2FA; padding:16px; }
.grid { display:flex; gap:10px; flex-wrap:wrap; }
.item { display:flex; flex-direction:column; align-items:center; gap:8px; }
.shape { width:56px; height:56px; background:#EADDFF; border:2px solid #6750A4; display:flex; align-items:center; justify-content:center; }
.name { font-size:10px; font-weight:500; color:#1C1B1F; text-align:center; }
.val { font-size:9px; color:#79747E; }
</style>
</head><body>
<div class="grid">
  <div class="item"><div class="shape" style="border-radius:0px"></div><div class="name">None</div><div class="val">0px</div></div>
  <div class="item"><div class="shape" style="border-radius:4px"></div><div class="name">Extra Small</div><div class="val">4px</div></div>
  <div class="item"><div class="shape" style="border-radius:8px"></div><div class="name">Small</div><div class="val">8px</div></div>
  <div class="item"><div class="shape" style="border-radius:12px"></div><div class="name">Medium</div><div class="val">12px</div></div>
  <div class="item"><div class="shape" style="border-radius:16px"></div><div class="name">Large</div><div class="val">16px</div></div>
  <div class="item"><div class="shape" style="border-radius:28px"></div><div class="name">Extra Large</div><div class="val">28px</div></div>
  <div class="item"><div class="shape" style="border-radius:9999px"></div><div class="name">Full</div><div class="val">50%</div></div>
</div>
</body></html>
