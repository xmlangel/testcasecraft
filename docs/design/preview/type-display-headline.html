<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Roboto', sans-serif; background: #FFFBFE; padding: 20px 24px; color: #1C1B1F; }
.row { display:flex; align-items:baseline; gap: 16px; padding: 8px 0; border-bottom: 1px solid #E7E0EC; }
.row:last-child { border-bottom: none; }
.meta { width: 120px; flex-shrink:0; display:flex; flex-direction:column; gap:2px; }
.meta .name { font-size: 11px; font-weight: 500; color: #6750A4; letter-spacing: 0.5px; }
.meta .spec { font-size: 10px; color: #79747E; }
.sample { flex:1; color: #1C1B1F; }
</style>
</head><body>
<div class="row">
  <div class="meta"><div class="name">Display L</div><div class="spec">57 / 64 / −0.25</div></div>
  <div class="sample" style="font-size:42px;line-height:1.1;font-weight:400">Display</div>
</div>
<div class="row">
  <div class="meta"><div class="name">Display M</div><div class="spec">45 / 52 / 0</div></div>
  <div class="sample" style="font-size:36px;line-height:1.15;font-weight:400">Display</div>
</div>
<div class="row">
  <div class="meta"><div class="name">Display S</div><div class="spec">36 / 44 / 0</div></div>
  <div class="sample" style="font-size:30px;line-height:44px;font-weight:400">Display</div>
</div>
<div class="row">
  <div class="meta"><div class="name">Headline L</div><div class="spec">32 / 40 / 0</div></div>
  <div class="sample" style="font-size:28px;line-height:40px;font-weight:400">Headline Large</div>
</div>
<div class="row">
  <div class="meta"><div class="name">Headline M</div><div class="spec">28 / 36 / 0</div></div>
  <div class="sample" style="font-size:24px;line-height:36px;font-weight:400">Headline Medium</div>
</div>
<div class="row">
  <div class="meta"><div class="name">Headline S</div><div class="spec">24 / 32 / 0</div></div>
  <div class="sample" style="font-size:22px;line-height:32px;font-weight:400">Headline Small</div>
</div>
</body></html>
