services:
  # PostgreSQL with pgvector extension
  postgres-rag:
    image: ankane/pgvector:latest
    container_name: testcase-postgres-rag
    environment:
      POSTGRES_DB: rag_db
      POSTGRES_USER: rag_user
      POSTGRES_PASSWORD: rag_dev_password_123
    ports:
      - "5433:5432"
    volumes:
      - postgres-rag-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    networks:
      - testcase-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag_user -d rag_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: testcase-minio-rag
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin_dev_password_789
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console
    volumes:
      - minio-data:/data
    networks:
      - testcase-network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI RAG Service
  rag-service:
    build:
      context: ./rag-service
      dockerfile: Dockerfile
    container_name: testcase-rag-service
    environment:
      # Database
      DATABASE_URL: postgresql://rag_user:rag_dev_password_123@postgres-rag:5432/rag_db

      # MinIO (Docker Compose MinIO 사용)
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin_dev_password_789
      MINIO_BUCKET: rag-documents
      MINIO_SECURE: "false"

      # Document Parser Configuration
      # Options: upstage, pymupdf, pymupdf4llm, pypdf2, auto
      # Using pymupdf4llm for LLM-optimized markdown extraction (no API key required)
      DOCUMENT_PARSER: ${DOCUMENT_PARSER:-pymupdf4llm}

      # Upstage API (not used when using pymupdf4llm)
      UPSTAGE_API_KEY: ${UPSTAGE_API_KEY:-your_upstage_api_key}

      # Application
      APP_ENV: development
      LOG_LEVEL: DEBUG
    ports:
      - "8001:8000"
    volumes:
      - ./rag-service/app:/app/app
    networks:
      - testcase-network
    depends_on:
      postgres-rag:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

networks:
  testcase-network:
    driver: bridge

volumes:
  postgres-rag-data:
    driver: local
  minio-data:
    driver: local
